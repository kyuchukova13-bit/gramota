<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Генератор на Грамоти - Фикс Печат</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,700;1,400&family=Kelly+Slab&family=Tenor+Sans&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-grad: linear-gradient(135deg, #cfb07e 0%, #a67c00 50%, #5d461a 100%);
            --name-color: #b21f1f;
        }

        /* Настройки за самия лист при печат */
        @page {
            size: A4 landscape;
            margin: 0;
        }

        body { 
            background: #2c2c2c; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            -webkit-print-color-adjust: exact; /* Важно за цветовете при печат */
        }

        /* КОНТРОЛЕН ПАНЕЛ */
        #admin-panel {
            background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100; align-items: flex-end;
        }
        .tool-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 10px; font-weight: bold; color: #777; text-transform: uppercase; }
        select, input, button { padding: 6px; border: 1px solid #ddd; border-radius: 5px; }

        /* ГРАМОТА - ТОЧЕН ФОРМАТ А4 */
        .cert-canvas {
            width: 297mm;
            height: 210mm;
            background: #fff;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            page-break-after: always;
        }

        /* РАМКИ */
        .frame-classic { border: 12mm solid; border-image: linear-gradient(45deg, #a67c00, #cfb07e, #5d461a) 1; }
        .frame-modern { border: 15mm solid #2c3e50; }
        .frame-modern::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 3mm solid #a67c00; box-sizing: border-box; pointer-events: none; }
        .frame-art { border: 1px solid #eee; }
        .frame-art::before { content: ''; position: absolute; top: 10mm; left: 10mm; width: 20mm; height: 20mm; border-top: 4px solid #a67c00; border-left: 4px solid #a67c00; }
        .frame-art::after { content: ''; position: absolute; bottom: 10mm; right: 10mm; width: 20mm; height: 20mm; border-bottom: 4px solid #a67c00; border-right: 4px solid #a67c00; }

        .content {
            width: 80%;
            height: 80%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            z-index: 10;
        }

        .title {
            font-family: 'Cinzel', serif; font-size: 90px; margin: 0;
            background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
        }

        .subtitle { font-family: 'Playfair Display', serif; font-size: 28px; font-style: italic; color: #444; margin: 0; }

        .student-name {
            font-family: 'Kelly Slab', serif; 
            font-size: 80px; 
            color: var(--name-color);
            margin: 10px 0; outline: none; min-width: 600px; display: inline-block;
        }

        .label-style { font-family: 'Tenor Sans', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: #999; }
        .reason { font-family: 'Tenor Sans', sans-serif; font-size: 22px; line-height: 1.4; color: #333; padding: 0 20px; }

        .footer { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 10mm; }
        .sign-block { width: 220px; border-top: 1px solid #a67c00; padding-top: 5px; }
        
        #logo-slot { width: 110px; height: 110px; display: flex; justify-content: center; }
        #logo-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Специфични корекции при печат */
        @media print {
            body { background: none; padding: 0; }
            #admin-panel { display: none; }
            .cert-canvas { 
                box-shadow: none; 
                margin: 0;
                position: absolute;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div class="tool-group">
            <label>🖼️ Рамка</label>
            <select onchange="updateFrame(this.value)">
                <option value="frame-classic">Златна Класик</option>
                <option value="frame-modern">Модерна Тъмна</option>
                <option value="frame-art">Арт Минимум</option>
                <option value="frame-none">Без рамка</option>
            </select>
        </div>

        <div class="tool-group">
            <label>🖋️ Шрифт Име</label>
            <select onchange="updateNameFont(this.value)">
                <option value="'Kelly Slab', serif">Технически (Kelly Slab)</option>
                <option value="'Tenor Sans', sans-serif">Благороден (Tenor Sans)</option>
                <option value="'Comfortaa', cursive">Геометричен (Comfortaa)</option>
                <option value="'Cinzel', serif">Величествен (Cinzel)</option>
            </select>
        </div>

        <div class="tool-group">
            <label>🎨 Цвят Име</label>
            <input type="color" value="#b21f1f" onchange="updateNameColor(this.value)">
        </div>

        <div class="tool-group">
            <label>🛡️ Лого / Печат</label>
            <div style="display:flex; gap:5px;">
                <input type="file" accept="image/*" onchange="loadLogo(event)" style="width:130px;">
                <button onclick="document.getElementById('logo-img').style.display='none'">❌</button>
            </div>
        </div>

        <button onclick="window.print()" style="background: #27ae60; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer;">🖨️ ПЕЧАТ (A4)</button>
    </div>

    <div class="cert-canvas frame-classic" id="certPage">
        <div class="content">
            <div>
                <h1 class="title">ГРАМОТА</h1>
                <div class="subtitle" contenteditable="true">за изключителни постижения</div>
            </div>

            <div>
                <div class="label-style">присъжда се на</div>
                <div class="student-name" id="nameBox" contenteditable="true">Име и Фамилия</div>
            </div>

            <div class="reason" contenteditable="true">
                за показани завидни знания и бърза мисъл <br>
                в  състезанието 
            </div>

            <div class="footer">
                <div class="sign-block">
                    <div style="font-size: 18px;" contenteditable="true">25.03.2026 г.</div>
                    <div class="label-style" style="font-size: 9px;">Дата</div>
                </div>

                <div id="logo-slot">
                    <img src="https://i.imgur.com/rN2w9uX.png" id="logo-img">
                </div>

                <div class="sign-block">
                    <div style="font-size: 18px;" contenteditable="true">Име и Фамилия</div>
                    <div class="label-style" style="font-size: 9px;">Преподавател</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateFrame(f) { document.getElementById('certPage').className = 'cert-canvas ' + f; }
        function updateNameFont(f) { document.getElementById('nameBox').style.fontFamily = f; }
        function updateNameColor(c) { document.documentElement.style.setProperty('--name-color', c); }
        function loadLogo(e) {
            const r = new FileReader();
            r.onload = function(){
                const out = document.getElementById('logo-img');
                out.src = r.result;
                out.style.display = 'block';
            };
            r.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
